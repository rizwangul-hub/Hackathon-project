<!DOCTYPE html>
<html lang="en">

<body>
    <header>

    <h2>Sign Up</h2>

<form id="signupForm">
  <input type="text" id="name" placeholder="Enter Name" required><br><br>
  <input type="email" id="email" placeholder="Enter Email" required><br><br>
  <input type="password" id="password" placeholder="Enter Password" required><br><br>
  <button type="submit">Sign Up</button>
</form>


<h2>Sign In</h2>

<form id="signinForm">
  <input type="email" id="loginEmail" placeholder="Enter Email" required><br><br>
  <input type="password" id="loginPassword" placeholder="Enter Password" required><br><br>
  <button type="submit">Sign In</button>
</form>

<button onclick="logout()">Logout</button>
    
</body>
</html>
